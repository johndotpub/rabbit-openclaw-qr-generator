name: QR Generation Tests

on:
  push:
    branches: [ main, 'copilot/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-qr-generation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Playwright
        run: |
          npm install --save-dev @playwright/test
          npx playwright install chromium
      
      - name: Run QR generation tests
        run: |
          cat > test-qr-generation.mjs << 'EOF'
          import { chromium } from '@playwright/test';
          import { createServer } from 'http';
          import { readFileSync } from 'fs';
          import { join, dirname } from 'path';
          import { fileURLToPath } from 'url';

          const __dirname = dirname(fileURLToPath(import.meta.url));

          // Simple HTTP server
          const server = createServer((req, res) => {
            const filePath = req.url === '/' ? 'index.html' : req.url.slice(1);
            const fullPath = join(__dirname, filePath);
            
            try {
              const data = readFileSync(fullPath);
              const ext = fullPath.split('.').pop();
              const contentTypes = {
                'html': 'text/html',
                'js': 'text/javascript',
                'json': 'application/json'
              };
              
              res.writeHead(200, { 'Content-Type': contentTypes[ext] || 'text/plain' });
              res.end(data);
            } catch (err) {
              res.writeHead(404);
              res.end('Not found');
            }
          });

          server.listen(8765);
          console.log('Test server running on http://localhost:8765\n');

          // Test cases
          const testCases = [
            {
              name: 'Small payload (~60 chars)',
              data: {
                ips: '10.0.0.1',
                port: '8080',
                token: 'test',
                protocol: 'ws',
                version: '1'
              }
            },
            {
              name: 'Typical payload (~128 chars)',
              data: {
                ips: '192.168.1.10,10.0.0.5',
                port: '8080',
                token: 'test-token-12345',
                protocol: 'ws',
                version: '1'
              }
            },
            {
              name: 'Large payload (~180 chars)',
              data: {
                ips: '192.168.1.10,192.168.1.11,192.168.1.12',
                port: '8080',
                token: 'this-is-a-very-long-token-for-testing-purposes-123456789',
                protocol: 'wss',
                version: '1'
              }
            },
            {
              name: 'Special characters in token',
              data: {
                ips: '127.0.0.1',
                port: '3000',
                token: 'token_with-special.chars@123',
                protocol: 'tcp',
                version: '1'
              }
            }
          ];

          // Run tests
          const browser = await chromium.launch();
          const context = await browser.newContext();
          const page = await context.newPage();

          await page.goto('http://localhost:8765/index.html');
          await page.waitForTimeout(1000);

          let passed = 0;
          let failed = 0;

          for (const testCase of testCases) {
            try {
              console.log(`Testing: ${testCase.name}`);
              
              // Fill form
              await page.fill('#ips', testCase.data.ips);
              await page.fill('#port', testCase.data.port);
              await page.fill('#token', testCase.data.token);
              await page.selectOption('#protocol', testCase.data.protocol);
              await page.fill('#version', testCase.data.version);
              
              // Build QR
              await page.click('button:has-text("Build QR")');
              await page.waitForTimeout(500);
              
              // Check canvas for QR code
              const hasQR = await page.evaluate(() => {
                const canvas = document.getElementById('qrCanvas');
                if (!canvas) return false;
                
                const ctx = canvas.getContext('2d');
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                // Check for black pixels (QR code present)
                for (let i = 0; i < imageData.data.length; i += 4) {
                  const r = imageData.data[i];
                  const g = imageData.data[i + 1];
                  const b = imageData.data[i + 2];
                  if (r < 128 && g < 128 && b < 128) return true;
                }
                return false;
              });
              
              // Validate JSON
              const jsonText = await page.textContent('#jsonPreview');
              const json = JSON.parse(jsonText);
              
              const expectedIps = testCase.data.ips.split(',').map(ip => ip.trim());
              const isValid = 
                json.type === 'openclaw-gateway' &&
                json.version === parseInt(testCase.data.version) &&
                JSON.stringify(json.ips) === JSON.stringify(expectedIps) &&
                json.port === parseInt(testCase.data.port) &&
                json.token === testCase.data.token &&
                json.protocol === testCase.data.protocol;
              
              if (hasQR && isValid) {
                console.log(`  ✓ PASS: QR generated successfully`);
                console.log(`    - Payload length: ${jsonText.length} chars`);
                passed++;
              } else {
                console.log(`  ✗ FAIL: QR=${hasQR}, JSON valid=${isValid}`);
                failed++;
              }
            } catch (error) {
              console.log(`  ✗ FAIL: ${error.message}`);
              failed++;
            }
            console.log('');
          }

          await browser.close();
          server.close();

          console.log('==============================');
          console.log(`Test Results: ${passed} passed, ${failed} failed\n`);

          process.exit(failed > 0 ? 1 : 0);
          EOF
          
          node test-qr-generation.mjs
