name: Test localhost.html

on:
  push:
    branches: [ main, 'copilot/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-localhost-html:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install --save-dev @playwright/test
          npx playwright install chromium

      - name: Test localhost.html QR generation
        run: |
          cat > test-localhost.mjs << 'EOF'
          import { chromium } from '@playwright/test';
          import { createServer } from 'http';
          import { readFileSync } from 'fs';
          import { join, dirname } from 'path';
          import { fileURLToPath } from 'url';

          const __dirname = dirname(fileURLToPath(import.meta.url));

          const server = createServer((req, res) => {
            const filePath = req.url === '/' ? 'localhost.html' : req.url.slice(1);
            const fullPath = join(__dirname, filePath);
            try {
              const data = readFileSync(fullPath);
              const ext = fullPath.split('.').pop();
              const contentTypes = {
                'html': 'text/html',
                'js': 'text/javascript',
                'json': 'application/json'
              };
              res.writeHead(200, { 'Content-Type': contentTypes[ext] || 'text/plain' });
              res.end(data);
            } catch (err) {
              res.writeHead(404);
              res.end('Not found');
            }
          });

          server.listen(8766);
          console.log('Test server running on http://localhost:8766\n');

          // localhost.html has no version field - version is hardcoded to 1
          const testCases = [
            {
              name: 'Small payload (~60 chars)',
              data: { ips: '10.0.0.1', port: '8080', token: 'test', protocol: 'ws' }
            },
            {
              name: 'Typical payload (~128 chars)',
              data: { ips: '192.168.1.10,10.0.0.5', port: '8080', token: 'test-token-12345', protocol: 'ws' }
            },
            {
              name: 'Large payload (~180 chars)',
              data: { ips: '192.168.1.10,192.168.1.11,192.168.1.12', port: '8080', token: 'this-is-a-very-long-token-for-testing-purposes-123456789', protocol: 'wss' }
            },
            {
              name: 'Special characters in token',
              data: { ips: '127.0.0.1', port: '3000', token: 'token_with-special.chars@123', protocol: 'ws' }
            }
          ];

          const browser = await chromium.launch();
          const context = await browser.newContext();
          const page = await context.newPage();

          await page.goto('http://localhost:8766/localhost.html');
          await page.waitForTimeout(1000);

          let passed = 0;
          let failed = 0;

          for (const testCase of testCases) {
            try {
              console.log(`Testing: ${testCase.name}`);

              await page.fill('#ips', testCase.data.ips);
              await page.fill('#port', testCase.data.port);
              await page.fill('#token', testCase.data.token);
              await page.selectOption('#protocol', testCase.data.protocol);

              await page.click('button:has-text("Build QR")');
              await page.waitForTimeout(500);

              // localhost.html renders QR as img inside #qrcode div
              const hasQR = await page.evaluate(() => {
                const qrcodeEl = document.getElementById('qrcode');
                if (!qrcodeEl) return false;
                const img = qrcodeEl.querySelector('img');
                return img && img.src && img.src.startsWith('data:image/png');
              });

              const jsonText = await page.textContent('#jsonPreview');
              const json = JSON.parse(jsonText);

              const expectedIps = testCase.data.ips.split(',').map(ip => ip.trim());
              const isValid =
                json.type === 'openclaw-gateway' &&
                json.version === 1 &&
                JSON.stringify(json.ips) === JSON.stringify(expectedIps) &&
                json.port === parseInt(testCase.data.port) &&
                json.token === testCase.data.token &&
                json.protocol === testCase.data.protocol;

              if (hasQR && isValid) {
                console.log(`  ✓ PASS: QR generated successfully`);
                console.log(`    - Payload length: ${jsonText.length} chars`);
                passed++;
              } else {
                console.log(`  ✗ FAIL: QR=${hasQR}, JSON valid=${isValid}`);
                if (!isValid) console.log(`    JSON: ${jsonText.substring(0, 100)}...`);
                failed++;
              }
            } catch (error) {
              console.log(`  ✗ FAIL: ${error.message}`);
              failed++;
            }
            console.log('');
          }

          await browser.close();
          server.close();

          console.log('==============================');
          console.log(`Test Results: ${passed} passed, ${failed} failed\n`);

          process.exit(failed > 0 ? 1 : 0);
          EOF

          node test-localhost.mjs
